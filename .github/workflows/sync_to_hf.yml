name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # HEAD:refs/heads/main forces Git to push the current code to HF's main branch
        run: git push --force https://n-ou:$HF_TOKEN@huggingface.co/spaces/n-ou/ai-recruitment HEAD:refs/heads/main